apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-provisioner
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea-provisioner
  template:
    metadata:
      labels:
        app: gitea-provisioner
    spec:
      serviceAccountName: gitea-provisioner
      terminationGracePeriodSeconds: 60
      containers:
        - name: controller
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          env:
            - name: GITEA_URL
              value: {{ .Values.gitea.url }}
            - name: GITEA_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.adminSecret.name }}
                  key: username
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitea.adminSecret.name }}
                  key: password
